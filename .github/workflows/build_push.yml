name: CI

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type (Debug or Release)"
        required: false
        default: "Debug"
        type: choice
        options:
          - Debug
          - Release

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

env:
  CI_CHUNK_SIZE: 80
  IS_PR_CHECK: false
  # Change this to "Release" once you've set up signing secrets:
  #   SIGNING_KEY, ALIAS, KEY_STORE_PASSWORD, KEY_PASSWORD
  # If BUILD_TYPE is Release but secrets are missing, it falls back to Debug automatically.
  BUILD_TYPE: ${{ github.event.inputs.build_type || 'Debug' }}

jobs:
  prepare:
    name: Prepare job
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.generate-matrices.outputs.matrix }}
      delete: ${{ steps.generate-matrices.outputs.delete }}
      effective_build_type: ${{ steps.set-build-type.outputs.type }}
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get last successful CI commit
        uses: nrwl/nx-set-shas@v5
        with:
          fallback-sha: 4b825dc642cb6eb9a060e54bf8d69288fbee4904 # empty tree

      - name: Determine effective build type
        id: set-build-type
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          # If user wants Release but has no signing key, fall back to Debug.
          if [ "${BUILD_TYPE}" = "Release" ] && [ -z "$SIGNING_KEY" ]; then
            echo "::warning::BUILD_TYPE is Release but SIGNING_KEY secret is not set — falling back to Debug."
            echo "type=Debug" >> "$GITHUB_OUTPUT"
          else
            echo "type=${BUILD_TYPE}" >> "$GITHUB_OUTPUT"
          fi

      - id: generate-matrices
        name: Create output matrices
        run: |
          python ./.github/scripts/generate-build-matrices.py "$NX_BASE" "${{ steps.set-build-type.outputs.type }}"

  build:
    name: Build extensions (${{ matrix.chunk.number }})
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ toJson(fromJson(needs.prepare.outputs.matrix).chunk) != '[]' }}
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ matrix.chunk.number > 1 }}

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Prepare signing key
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          if [ -n "$SIGNING_KEY" ]; then
            echo "$SIGNING_KEY" | base64 -d > signingkey.jks
            echo "✓ Signing key prepared."
          else
            echo "ℹ No signing key — building debug APK."
          fi

      - name: Build extensions (${{ matrix.chunk.number }})
        env:
          MODULES: ${{ join(matrix.chunk.modules, ' ') }}
          ALIAS: ${{ secrets.ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew $MODULES

      - name: Upload APKs (${{ matrix.chunk.number }})
        uses: actions/upload-artifact@v4
        with:
          name: "individual-apks-${{ matrix.chunk.number }}"
          path: |
            **/build/outputs/apk/debug/*.apk
            **/build/outputs/apk/release/*.apk
            **/build/outputs/jar/release/*.jar
            **/build/keiyoushi-source-info.json
          retention-days: 30
          if-no-files-found: error

      - name: Clean up signing key
        if: always()
        run: rm -f signingkey.jks

  # -----------------------------------------------------------------------
  # Publish job — pushes built APKs to a `repo` branch so Mihon can read them
  # -----------------------------------------------------------------------
  # ENABLE this by changing `if: false` to `if: true` below, AND:
  #   1. Set the BUILD_TYPE env var above to "Release" (or pass it via workflow_dispatch)
  #   2. Set up signing secrets (SIGNING_KEY, ALIAS, KEY_STORE_PASSWORD, KEY_PASSWORD)
  #      — run ./setup-signing.sh to generate them
  #   3. Create a `repo` branch in this same repo (or a separate extensions repo):
  #        git checkout --orphan repo
  #        git rm -rf .
  #        mkdir apk jar icon
  #        echo '{"index_v2":"https://raw.githubusercontent.com/<you>/<repo>/repo/index.pb","meta":{"name":"MyRepo","website":"https://github.com/<you>/<repo>","signingKeyFingerprint":"<your-fingerprint>"}}' > repo.json
  #        git add . && git commit -m "init repo branch" && git push origin repo
  #   4. Edit .github/scripts/publish-repo.py — set your APK_BASE_URL, JAR_BASE_URL,
  #      ICON_BASE_URL, signingKey, name, contact.
  #   5. In Mihon: More → Settings → Browse → Extension repos → Add:
  #        https://raw.githubusercontent.com/<you>/<repo>/repo/index.min.json
  # -----------------------------------------------------------------------
  publish:
    name: Publish extension repo
    needs: [prepare, build]
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: ~/apk-artifacts

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          path: main

      - name: Checkout repo branch
        uses: actions/checkout@v4
        with:
          ref: repo
          path: repo
          persist-credentials: true

      - name: Publish and deploy repo
        env:
          DELETE: ${{ needs.prepare.outputs.delete }}
        run: |
          cd repo
          pip install protobuf
          python ../main/.github/scripts/publish-repo.py "$DELETE"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git status
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "Update extensions repo"
            git push
          else
            echo "No changes to commit"
          fi
